apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthcare-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - http:
      paths:
      - path: /api/patients
        pathType: Prefix
        backend:
          service:
            name: patient-service
            port:
              number: 5001
      # Add other services here
