apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptom-service
  template:
    metadata:
      labels:
        app: ai-symptom-service
    spec:
      containers:
        - name: ai-symptom-service
          image: ai-symptom-service:latest
          ports:
            - containerPort: 4001
---
apiVersion: v1
kind: Service
metadata:
  name: ai-symptom-service
spec:
  type: ClusterIP
  selector:
    app: ai-symptom-service
  ports:
    - protocol: TCP
      port: 4001
      targetPort: 4001
