apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptom-service
  template:
    metadata:
      labels:
        app: ai-symptom-service
    spec:
      containers:
        - name: ai-symptom-service
          image: ai-symptom-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
            - name: MONGO_URI
              value: "mongodb://mongodb:27017/ai_symptom_db"
            - name: JWT_SECRET
              value: "secret"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-symptom-service
spec:
  type: ClusterIP
  selector:
    app: ai-symptom-service
  ports:
    - protocol: TCP
      port: 4001
      targetPort: 4001
