name: Healthcare Platform CI/CD Continuous Integration

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build & Test Microservices
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: 
          - api-gateway
          - services/patient-service
          - services/doctor-service
          - services/appointment-service
          - services/telemedicine-service
          - services/payment-service
          - services/notification-service
          - services/ai-symptom-service
          - services/identity-service
          - frontend

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'

    - name: Install Dependencies
      working-directory: ./${{ matrix.service }}
      run: npm install

    - name: Run Tests (if existing)
      working-directory: ./${{ matrix.service }}
      run: npm test --if-present

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Validate Docker Build
      working-directory: ./${{ matrix.service }}
      run: |
        # Ensure compatible image naming by removing slashes
        IMAGE_NAME=$(echo "healthcare-${{ matrix.service }}" | sed 's/\//-/g')
        echo "Building Docker Image: $IMAGE_NAME"
        
        # Retry logic for Docker build to handle Docker Hub transient 504 errors
        for i in {1..3}; do
          echo "Attempt $i: Building $IMAGE_NAME"
          docker build -t $IMAGE_NAME:latest . && break || {
            if [ $i -lt 3 ]; then
              echo "Build failed (likely transient network issue), retrying in 20 seconds..."
              sleep 20
            else
              echo "Build failed after 3 attempts."
              exit 1
            fi
          }
        done
