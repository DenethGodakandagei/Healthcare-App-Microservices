version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  api-gateway:
    build: ./api-gateway
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    depends_on:
      - patient-service
      - doctor-service
      - appointment-service

  patient-service:
    build: ./services/patient-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb+srv://root:root@cluster0.5t3vhyk.mongodb.net/patient_db?appName=Cluster0
      
  doctor-service:
    build: ./services/doctor-service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGO_URI=mongodb+srv://root:root@cluster0.5t3vhyk.mongodb.net/doctor_db?appName=Cluster0
      
  appointment-service:
    build: ./services/appointment-service
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - MONGO_URI=mongodb+srv://root:root@cluster0.5t3vhyk.mongodb.net/appointment_db?appName=Cluster0

  telemedicine-service:
    build: ./services/telemedicine-service
    ports:
      - "5004:5004"
    environment:
      - PORT=5004

  payment-service:
    build: ./services/payment-service
    ports:
      - "5005:5005"
    environment:
      - PORT=5005

  notification-service:
    build: ./services/notification-service
    ports:
      - "5006:5006"
    environment:
      - PORT=5006

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"

volumes:
  mongodb_data:
