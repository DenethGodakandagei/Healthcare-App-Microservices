version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  api-gateway:
    build: ./api-gateway
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
    depends_on:
      - ai-symptom-service
      - appointment-service
      - doctor-service
      - identity-service
      - notification-service
      - patient-service
      - payment-service
      - telemedicine-service

  ai-symptom-service:
    build: ./services/ai-symptom-service
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - MONGO_URI=mongodb://mongodb:27017/ai_symptom_db
      - JWT_SECRET=secret

  appointment-service:
    build: ./services/appointment-service
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - MONGO_URI=mongodb://mongodb:27017/appointment_db
      - JWT_SECRET=secret

  doctor-service:
    build: ./services/doctor-service
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - MONGO_URI=mongodb://mongodb:27017/doctor_db
      - JWT_SECRET=secret

  identity-service:
    build: ./services/identity-service
    ports:
      - "4004:4004"
    environment:
      - PORT=4004
      - MONGO_URI=mongodb://mongodb:27017/identity_db
      - JWT_SECRET=secret

  notification-service:
    build: ./services/notification-service
    ports:
      - "4005:4005"
    environment:
      - PORT=4005
      - MONGO_URI=mongodb://mongodb:27017/notification_db
      - JWT_SECRET=secret

  patient-service:
    build: ./services/patient-service
    ports:
      - "4006:4006"
    environment:
      - PORT=4006
      - MONGO_URI=mongodb://mongodb:27017/patient_db
      - JWT_SECRET=secret

  payment-service:
    build: ./services/payment-service
    ports:
      - "4007:4007"
    environment:
      - PORT=4007
      - MONGO_URI=mongodb://mongodb:27017/payment_db
      - JWT_SECRET=secret

  telemedicine-service:
    build: ./services/telemedicine-service
    ports:
      - "4008:4008"
    environment:
      - PORT=4008
      - MONGO_URI=mongodb://mongodb:27017/telemedicine_db
      - JWT_SECRET=secret

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"

volumes:
  mongodb_data:
